<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWaste - Forgot Password</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* =========================================
           Design System & Variables
        ========================================= */
        :root {
            --bg-darker: #05080c;
            --glass-bg: rgba(20, 28, 43, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --accent-teal: #00f2fe;
            --accent-purple: #4facfe;
            --accent-blue: #0284c7;
            --success: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 40px 0;
        }

        /* Background Animated Blobs */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .bg-teal { width: 400px; height: 400px; background: var(--accent-teal); top: 10%; left: 10%; }
        .bg-purple { width: 600px; height: 600px; background: var(--accent-purple); bottom: 10%; right: 5%; animation-delay: -5s; }
        .bg-blue { width: 500px; height: 500px; background: var(--accent-blue); top: -100px; right: 30%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Glassmorphism Container */
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header / Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .logo i {
            color: var(--success);
            font-size: 32px;
            background: rgba(16, 185, 129, 0.15);
            padding: 8px;
            border-radius: 12px;
        }

        h2.title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Forms */
        .input-group {
            margin-bottom: 32px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 20px;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px 14px 48px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-purple);
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <!-- Background Animated Blobs -->
    <div class="bg-shape bg-teal"></div>
    <div class="bg-shape bg-purple"></div>
    <div class="bg-shape bg-blue"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class='bx bx-leaf'></i>
                <span>EcoWaste</span>
            </div>
            <h2 class="title">Reset Password</h2>
            <p class="subtitle">Enter your email to receive recovery instructions</p>

            <form id="forgot-password-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                </div>

                <div id="reset-error" style="color: #ef4444; font-size: 14px; text-align: center; margin-bottom: 16px; display: none;"></div>
                <div id="reset-success" style="color: #10b981; font-size: 14px; text-align: center; margin-bottom: 16px; display: none;"></div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    Send Reset Link <i class='bx bx-send'></i>
                </button>
                
                <a href="index.html" class="back-link"><i class='bx bx-left-arrow-alt'></i> Back to Login</a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-password-form');
            const submitBtn = document.getElementById('submit-btn');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const errorDiv = document.getElementById('reset-error');
                const successDiv = document.getElementById('reset-success');
                
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';

                const currentText = submitBtn.innerHTML;
                submitBtn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Sending...";
                submitBtn.style.opacity = '0.8';
                submitBtn.disabled = true;

                try {
                    // Simulate an API call to a hypothetical /api/auth/forgot-password or just mimic a success delay
                    // You can replace this fetch with your actual backend endpoint later
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // Display success
                    successDiv.textContent = "If an account matches that email, a reset link has been sent.";
                    successDiv.style.display = 'block';
                    
                    // Reset everything
                    form.reset();
                    submitBtn.innerHTML = currentText;
                    submitBtn.style.opacity = '1';
                    submitBtn.disabled = false;
                    
                } catch (error) {
                    submitBtn.innerHTML = currentText;
                    submitBtn.style.opacity = '1';
                    submitBtn.disabled = false;
                    
                    errorDiv.textContent = 'Failed to send reset link. Please try again.';
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
